.hikari-navbar {
  position: relative;
  top: 0; left: 0; right: 0;
  z-index: 1001;

  background-color: #ffffff;
  display: flex;
  flex-direction: row;
  justify-content: space-between;
  align-items: center;
  padding: 0 8px;

  font-size: 14px;
  line-height: 22px;
  color: #3e4045;
  flex-shrink: 0;
}
.hikari-navbar-left {
  width: 500px;
  display: flex;
  flex-direction: row;
  justify-content: space-between;
  align-items: center;
}
.hikari-navbar-right {
  display: flex;

  justify-content: space-between;

}
.hikari-navbar-section {

  align-items: center;
}
.hikari-navbar-logo img {
  width: 24px;

}
.hikari-navbar-title {

}

.hikari-btn--icon:hover {

}

function CodeLine({ number, content, type, highlight, annotation }) {
  const bgColor = type === "added" ? "bg-green-900/20" : type === "removed" ? "bg-red-900/20" : "";
  const borderColor = type === "added" ? "border-l-2 border-green-500" : type === "removed" ? "border-l-2 border-red-500" : "";
  const renderContent = () => {
    if (!highlight || !type) return React.createElement("span", null, content);
    const index = content.indexOf(highlight);
    if (index === -1) return React.createElement("span", null, content);
    const highlightBg = type === "added" ? "bg-green-500/30" : "bg-red-500/30";
    return React.createElement(React.Fragment, null,
      content.slice(0, index),
      React.createElement("span", { className: highlightBg }, content.slice(index, index + highlight.length)),
      content.slice(index + highlight.length)
    );
  };
  return (
    <div className={`flex ${bgColor} ${borderColor} group relative hover:bg-gray-800/50`}>
      <div className="px-4 py-1 text-gray-500 text-right w-16 select-none flex-shrink-0">{number}</div>
      <div className="px-2 py-1 flex-1 whitespace-pre">{renderContent()}</div>
      {annotation && (<div className="absolute right-2 top-1 opacity-0 group-hover:opacity-100 transition-opacity"><span className={`text-xs px-2 py-0.5 rounded ${type === "added" ? "bg-green-600 text-white" : type === "removed" ? "bg-red-600 text-white" : "bg-blue-600 text-white"}`}>{annotation}</span></div>)}
    </div>
  );
}

function ChangeGroup({ title, changes }) {
  const [isOpen, setIsOpen] = useState(true);
  return (
    <div className="border border-gray-200 rounded-lg overflow-hidden">
      <button onClick={() => setIsOpen(!isOpen)} className="w-full flex items-center justify-between p-3 bg-white hover:bg-gray-50 transition-colors">
        <div className="flex items-center gap-2">
          <IconChevronRight className={`w-4 h-4 text-gray-500 transition-transform ${isOpen ? "rotate-90" : ""}`} />
          <span className="text-sm font-medium text-gray-900">{title}</span>
        </div>
        <span className="text-xs bg-gray-100 text-gray-700 px-2 py-0.5 rounded">{changes.length}</span>

      {isOpen && (
        <div className="p-3 bg-gray-50 border-t border-gray-200 space-y-2">

            <div key={index} className="text-xs">

                    <span className="text-gray-400">{"\u2192"}</span>
                    {change.newValue.startsWith("#") && <div className="w-4 h-4 rounded border border-gray-300" style={{ backgroundColor: change.newValue }}></div>}

      <div className="flex flex-1 overflow-hidden min-h-0">
        {/* Left Sidebar */}
        <div className="w-80 min-w-[200px] max-w-[320px] flex-shrink bg-white border-r border-gray-200 flex flex-col">
          <div className="p-4 border-b border-gray-200">
            <h3 className="font-semibold text-gray-900 mb-3">Version History</h3>
            <button onClick={toggleCompareMode} className={`w-full flex items-center gap-2 p-3 rounded-lg border transition-all ${compareMode ? "bg-gray-900 border-gray-900 text-white" : "bg-white border-gray-300 text-gray-700 hover:border-gray-400"}`}>
              <IconGitCompare className="w-4 h-4" /><span className="text-sm font-medium">Compare Versions</span>
              {compareMode && <IconCheck className="w-4 h-4 ml-auto" />}
            </button>
          </div>
          <div className="flex-1 overflow-y-auto p-4 space-y-2">
            {versions.map((version) => (
              <VersionCard key={version.id} version={version} compareMode={compareMode}
                isSelected={!compareMode && selectedVersion === version.id}
                isFromVersion={compareMode && selectedOlderVersion === version.id}
                isToVersion={compareMode && version.isCurrent}
                onSelect={() => handleVersionClick(version.id)}
                onRestore={() => handleRestoreVersion(version.id)} />
            ))}
          </div>
        </div>

        {/* Main Area */}
        <div className="flex-1 flex overflow-hidden min-w-0">
          {compareMode ? (
            <div className="flex-1 flex flex-col min-h-0">
              {/* Diff Controls Bar */}
              <div style={{ backgroundColor: '#4a4c51' }} className="border-b border-gray-600 px-4 py-3 flex flex-wrap items-center justify-between gap-3 flex-shrink-0">
                <div className="flex items-center gap-4 min-w-0 flex-1">
                  <span className="text-sm text-gray-300 flex-shrink-0">Comparing:</span>
                  <div className="flex items-center gap-2 text-sm min-w-0 flex-1">
                    <span className="px-3 py-1.5 bg-red-900 text-red-300 rounded border border-red-700 max-w-[150px] lg:max-w-xs truncate">{versions.find(v => v.id === selectedOlderVersion)?.title || "Version"}</span>
                    <span className="text-gray-500 flex-shrink-0">{"\u2192"}</span>
                    <span className="px-3 py-1.5 bg-green-900 text-green-300 rounded border border-green-700 max-w-[150px] lg:max-w-xs truncate">{currentVersion.title}</span>
                  </div>
                </div>
                <div className="flex items-center gap-2 flex-shrink-0">
                  <span className="text-sm text-gray-400">View:</span>
                  <div className="flex border border-gray-600 rounded overflow-hidden" style={{ backgroundColor: '#3a3d42' }}>
                    <button className={`px-3 py-1 text-sm flex items-center gap-1.5 ${diffType === "layout" ? "bg-red-600 text-white" : "text-gray-300"}`} style={diffType !== "layout" ? { backgroundColor: 'transparent' } : {}} onClick={() => setDiffType("layout")}><IconLayout className="w-3.5 h-3.5" /> Layout</button>
                    <button className={`px-3 py-1 text-sm flex items-center gap-1.5 border-l border-gray-600 ${diffType === "code" ? "bg-red-600 text-white" : "text-gray-300"}`} style={diffType !== "code" ? { backgroundColor: 'transparent' } : {}} onClick={() => setDiffType("code")}><IconCode2 className="w-3.5 h-3.5" /> Code</button>
                  </div>
                </div>
              </div>

              {/* Diff Content */}
              {diffType === "layout" ? (
                <div className="flex-1 overflow-auto p-8">
                  <div className="grid grid-cols-2 gap-8 max-w-5xl mx-auto">
                    <div>
                      <div className="mb-3 flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-red-500"></div><span className="text-sm font-medium text-gray-300">{versions.find(v => v.id === selectedOlderVersion)?.title}</span></div>
                      <div className="rounded-2xl p-4" style={{ background: '#4a4c51' }}><PhonePreview versionId={selectedOlderVersion} /></div>
                    </div>
                    <div>
                      <div className="mb-3 flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-green-500"></div><span className="text-sm font-medium text-gray-300">{currentVersion.title}</span></div>
                      <div className="rounded-2xl p-4" style={{ background: '#4a4c51' }}><PhonePreview versionId={0} /></div>
                    </div>
                  </div>
                </div>
              ) : (
                <div className="flex-1 flex overflow-hidden min-h-0 min-w-0">
                  <div className="flex-1 overflow-auto bg-gray-900">
                    <div className="text-gray-300 font-mono text-xs leading-5">
                      {versionDiffs[selectedOlderVersion]?.lines.map((line, idx) => (
                        line.type === "collapsed"
                          ? <CollapsedLines key={'c-' + line.startLine} startLine={line.startLine} count={line.count} lines={line.lines} />
                          : <CodeLine key={line.number || idx} number={line.number} content={line.content} type={line.type} highlight={line.highlight} annotation={line.annotation} />
                      ))}
                    </div>
                  </div>

                  {/* Change Summary Panel */}
                  <div className={`relative transition-all duration-300 ${changeSummaryOpen ? 'w-80 xl:block hidden' : 'w-0'}`}>
                    {changeSummaryOpen && (
                      <div className="w-80 bg-orange-100 border-l border-orange-200 overflow-y-auto flex flex-col h-full hidden xl:flex">
                        <div className="sticky top-0 bg-white border-b border-orange-200 px-4 py-3 flex items-center justify-between z-10">
                          <h3 className="font-semibold text-gray-900">Changes Summary</h3>
                        </div>
                        <div className="flex-1 p-4 space-y-4">
                          {(() => {
                            const summary = versionChangeSummaries[selectedOlderVersion] || [];
                            const addedCount = summary.reduce((sum, group) => sum + group.changes.filter(c => c.type === 'added').length, 0);
                            const removedCount = summary.reduce((sum, group) => sum + group.changes.filter(c => c.type === 'removed').length, 0);
                            const modifiedCount = summary.reduce((sum, group) => sum + group.changes.filter(c => c.type === 'modified').length, 0);
                            return (
                              <>
                                <div className="grid grid-cols-3 gap-2">
                                  <div className="bg-green-50 border border-green-200 rounded p-2 text-center"><div className="text-xl font-bold text-green-700">+{addedCount}</div><div className="text-xs text-green-600">Added</div></div>
                                  <div className="bg-red-50 border border-red-200 rounded p-2 text-center"><div className="text-xl font-bold text-red-700">-{removedCount}</div><div className="text-xs text-red-600">Removed</div></div>
                                  <div className="bg-yellow-50 border border-yellow-200 rounded p-2 text-center"><div className="text-xl font-bold text-yellow-700">{modifiedCount}</div><div className="text-xs text-yellow-600">Modified</div></div>
                                </div>
                                <div className="space-y-2">
                                  {summary.map((group, idx) => (
                                    <ChangeGroup key={idx} title={group.title} changes={group.changes} />
                                  ))}
                                </div>
                              </>
                            );
                          })()}
                        </div>
                      </div>
                    )}
                    <button onClick={() => setChangeSummaryOpen(!changeSummaryOpen)} className="absolute left-0 top-1/2 -translate-y-1/2 -translate-x-full bg-orange-100/80 hover:bg-orange-200/80 text-orange-500 p-1 rounded-l transition-colors border border-orange-200/50 shadow-sm" title={changeSummaryOpen ? "Hide Changes Summary" : "Show Changes Summary"}>
                      <IconChevronRight className={`w-3 h-3 transition-transform ${changeSummaryOpen ? '' : 'rotate-180'}`} />
                    </button>
                  </div>
                </div>
              )}
            </div>
          ) : (
            <div className="flex-1 flex items-center justify-center">
              <div className="rounded-2xl p-6" style={{ background: '#4a4c51' }}><PhonePreview versionId={selectedVersion} /></div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(ThunkableMockup));
</script>
</body>
</html>
